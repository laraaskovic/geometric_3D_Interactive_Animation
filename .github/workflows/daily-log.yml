name: Daily Log

on:
  schedule:
    - cron: '14 17 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append daily entry
        run: |
          echo "$(date -u '+%Y-%m-%d'): Currently interning at Arches — daily work committed in company repos, logged here." >> daily-log.md

      - name: Commit and push
        run: |
          git config user.name "laraaskovic"
          git config user.email "160878434+laraaskovic@users.noreply.github.com"
          git add daily-log.md
          git commit -m "Daily log: $(date -u '+%Y-%m-%d') — interning at Arches" || echo "Nothing to commit"
          git push